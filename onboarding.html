<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Onboarding — RC Marine Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{height:100%;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#F4F4F6;--surface:#FFFFFF;--surface-m:#EEEEF0;--surface-h:#F8F8FA;
      --border:#E2E2E6;--border-s:#EDEDF0;--text:#1A1A1E;--text-2:#6E6E78;--text-3:#A0A0AA;
      --accent:#1A1A1E;--green:#10B981;--green-s:rgba(16,185,129,0.08);--green-b:rgba(16,185,129,0.22);
      --amber:#F59E0B;--amber-s:rgba(245,158,11,0.08);--amber-b:rgba(245,158,11,0.22);
      --violet:#8B5CF6;--violet-s:rgba(139,92,246,0.08);--violet-b:rgba(139,92,246,0.2);
      --serif:'Source Serif 4',Georgia,serif;--sans:'Nunito Sans',system-ui,sans-serif;--mono:'Fira Code',monospace;
      --r:14px;--r-sm:8px;
    }
    @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pop{0%{transform:scale(0.85)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
    @keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ── RESPONSIVE FOUNDATIONS ── */
    .ob-shell{min-height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);display:flex;flex-direction:column}
    .ob-header{padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-s);background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;flex-shrink:0}
    .ob-body{flex:1;overflow-y:auto;padding:28px 16px 120px;-webkit-overflow-scrolling:touch}
    .ob-footer{position:fixed;bottom:0;left:0;right:0;z-index:40;padding:12px 16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border-s);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .ob-content{max-width:960px;margin:0 auto;width:100%}

    /* ── STEP DOTS (mobile) ── */
    .step-dots{display:flex;align-items:center;gap:6px}
    .step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.3s}
    .step-dot.done{background:var(--accent)}
    .step-dot.active{background:var(--accent);width:24px;border-radius:4px}
    /* Full step labels (desktop) */
    .step-labels{display:none;align-items:center;gap:0}
    .step-line{width:32px;height:1.5px;background:var(--border);transition:background 0.4s}
    .step-line.done{background:var(--accent)}
    .step-label{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:99px}
    .step-num{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;font-family:var(--mono);transition:all 0.3s;border:1.5px solid var(--border);color:var(--text-3);background:transparent}
    .step-num.done,.step-num.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .step-text{font-size:11.5px;letter-spacing:-0.01em;color:var(--text-3);white-space:nowrap}
    .step-text.active{color:var(--text);font-weight:600}
    .step-text.done{color:var(--text-2)}

    /* ── INDUSTRY GRID ── */
    .ind-grid{display:grid;grid-template-columns:1fr;gap:14px}
    .ind-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:24px 20px 20px;cursor:pointer;transition:all 0.25s;position:relative;-webkit-user-select:none;user-select:none}
    .ind-card:active{transform:scale(0.98)}
    .ind-card.sel{transform:translateY(-2px)}
    .ind-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px}
    .ind-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.25s}
    .ind-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
    .ind-footer{display:flex;align-items:center;gap:6px;padding-top:12px;border-top:1px solid var(--border-s)}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:3.5px 10px;border-radius:99px;font-size:10.5px;font-weight:500;font-family:var(--sans);white-space:nowrap;transition:all 0.2s;letter-spacing:-0.01em}
    .sel-badge{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;animation:pop 0.3s ease}

    /* ── PERSONA GRID ── */
    .per-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .per-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:13px;cursor:pointer;background:var(--surface);border:2px solid var(--border);transition:all 0.2s;-webkit-user-select:none;user-select:none;min-height:48px}
    .per-card:active{transform:scale(0.98)}
    .per-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}

    /* ── GOALS ── */
    .cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
    .cat-tabs::-webkit-scrollbar{display:none}
    .cat-tab{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);transition:all 0.2s;flex-shrink:0;-webkit-user-select:none;user-select:none}
    .cat-tab:active{transform:scale(0.96)}
    .cat-tab.active{color:#fff;border-color:transparent}
    .cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 2px 8px;margin-top:8px}
    .goal-list{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
    .goal-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border-s);cursor:pointer;transition:background 0.15s;-webkit-user-select:none;user-select:none;min-height:56px}
    .goal-row:last-child{border-bottom:none}
    .goal-row:active{background:var(--surface-h)}
    .goal-cb{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;border:2px solid var(--border)}
    .goal-cb.on{border:none}
    .goal-cb.on svg{animation:checkPop 0.25s ease}
    .goal-info{flex:1;min-width:0}
    .goal-name{font-size:13.5px;font-weight:500;letter-spacing:-0.01em;line-height:1.3;color:var(--text)}
    .goal-desc{font-size:11.5px;color:var(--text-3);line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
    .goal-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .goal-expand{padding:4px 12px 16px 52px;animation:fadeIn 0.2s ease}
    .goal-expand .pill{margin:2px}
    .goal-metrics-pill{padding:3px 8px;border-radius:99px;font-size:10px;font-family:var(--mono);font-weight:500;background:var(--surface-m);color:var(--text-3)}
    .rec-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:2.5px 7px;border-radius:5px;font-family:var(--mono)}

    /* ── REVIEW ── */
    .rev-cards{display:grid;grid-template-columns:1fr;gap:12px}
    .rev-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:18px 20px}
    .rev-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-3);font-family:var(--mono);margin-bottom:8px}
    .rev-goallist{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
    .rev-cathdr{padding:10px 16px;background:var(--surface-h);border-bottom:1px solid var(--border-s);display:flex;align-items:center;justify-content:space-between}
    .rev-goalrow{padding:9px 16px;border-bottom:1px solid var(--border-s);display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-2)}
    .rev-goalrow:last-child{border-bottom:none}

    /* ── BUTTONS ── */
    .btn{padding:11px 24px;border-radius:99px;font-size:13.5px;font-weight:600;font-family:var(--sans);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all 0.2s;border:none;-webkit-user-select:none;user-select:none;letter-spacing:-0.01em}
    .btn:active{transform:scale(0.96)}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(0,0,0,0.12)}
    .btn-primary:disabled{background:var(--surface-m);color:var(--text-3);box-shadow:none;cursor:default;transform:none}
    .btn-secondary{background:var(--surface);color:var(--text-2);border:1.5px solid var(--border)}
    .btn-ghost{background:transparent;color:var(--text-3);padding:11px 14px}
    .btn-launch{color:#fff;box-shadow:0 4px 18px rgba(0,0,0,0.15)}

    /* ── TABLET (640px+) ── */
    @media(min-width:640px){
      .ob-header{padding:0 24px;height:60px}
      .ob-body{padding:36px 24px 120px}
      .ob-footer{padding:14px 24px}
      .ind-grid{grid-template-columns:1fr 1fr}
      .per-grid{grid-template-columns:1fr 1fr}
      .rev-cards{grid-template-columns:repeat(3,1fr)}
      .step-dots{display:none}
      .step-labels{display:flex}
      .goal-desc{-webkit-line-clamp:2}
    }
    /* ── DESKTOP (960px+) ── */
    @media(min-width:960px){
      .ob-header{padding:0 32px}
      .ob-body{padding:48px 32px 120px}
      .ob-footer{padding:16px 32px}
      .ind-grid{grid-template-columns:repeat(3,1fr)}
      .per-grid{grid-template-columns:repeat(3,1fr)}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══ THEME TOKENS (JS mirror) ═══ */
const T={
  bg:"#F4F4F6",surface:"#FFFFFF",surfaceMuted:"#EEEEF0",surfaceHover:"#F8F8FA",
  border:"#E2E2E6",borderSubtle:"#EDEDF0",text:"#1A1A1E",textSecondary:"#6E6E78",textTertiary:"#A0A0AA",
  accent:"#1A1A1E",green:"#10B981",greenSoft:"rgba(16,185,129,0.08)",greenBorder:"rgba(16,185,129,0.22)",
  amber:"#F59E0B",amberSoft:"rgba(245,158,11,0.08)",amberBorder:"rgba(245,158,11,0.22)",
  violet:"#8B5CF6",violetSoft:"rgba(139,92,246,0.08)",violetBorder:"rgba(139,92,246,0.2)",
  serif:"'Source Serif 4',Georgia,serif",sans:"'Nunito Sans',system-ui,sans-serif",mono:"'Fira Code',monospace",
};

/* ═══ ICONS ═══ */
const IC={
  check:(c="#fff",s=12)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="3" strokeLinecap="round"><path d="M20 6L9 17l-5-5"/></svg>,
  chevR:(c,s=16)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M9 18l6-6-6-6"/></svg>,
  chevL:(c,s=16)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>,
  chevD:(c,s=16)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M6 9l6 6 6-6"/></svg>,
  sparkle:(c,s=14)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z"/></svg>,
  people:(c)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  target:(c)=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
};

/* ═══ INDUSTRY ICONS ═══ */
const IndustryIcon=({type,color,size=44})=>{
  if(type==="manufacturing")return<svg width={size} height={size} viewBox="0 0 56 56" fill="none"><rect x="4" y="36" width="48" height="4" rx="2" fill={color} opacity="0.12"/><path d="M10 38V22l12-8v8l12-8v8l12-8v16" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><rect x="16" y="28" width="5" height="8" rx="1" stroke={color} strokeWidth="1.5"/><rect x="26" y="28" width="5" height="8" rx="1" stroke={color} strokeWidth="1.5"/><rect x="36" y="28" width="5" height="8" rx="1" stroke={color} strokeWidth="1.5"/></svg>;
  if(type==="qsr")return<svg width={size} height={size} viewBox="0 0 56 56" fill="none"><rect x="4" y="36" width="48" height="4" rx="2" fill={color} opacity="0.12"/><path d="M12 30c0-9 5-18 16-18s16 9 16 18" stroke={color} strokeWidth="2" strokeLinecap="round"/><path d="M8 30h40" stroke={color} strokeWidth="2" strokeLinecap="round"/><path d="M12 34h32l-2 6H14z" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/><path d="M20 30v-5c0-1 .8-2 2.5-2h11c1.7 0 2.5 1 2.5 2v5" stroke={color} strokeWidth="1.5" strokeLinecap="round"/></svg>;
  return<svg width={size} height={size} viewBox="0 0 56 56" fill="none"><rect x="4" y="36" width="48" height="4" rx="2" fill={color} opacity="0.12"/><rect x="6" y="18" width="28" height="18" rx="3" stroke={color} strokeWidth="2"/><path d="M34 24h10l7 8v4H34" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><circle cx="16" cy="40" r="5" stroke={color} strokeWidth="2"/><circle cx="42" cy="40" r="5" stroke={color} strokeWidth="2"/><path d="M21 36h17" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>;
};

/* ═══ DATA ═══ */
const INDUSTRIES=[
  {id:"manufacturing",label:"Manufacturing",color:T.green,colorSoft:T.greenSoft,colorBorder:T.greenBorder,desc:"Production lines, quality control, equipment maintenance, and supply chain visibility.",goalCount:24},
  {id:"qsr",label:"Quick Service Restaurants",color:T.amber,colorSoft:T.amberSoft,colorBorder:T.amberBorder,desc:"Speed of service, food safety, labor scheduling, and franchise performance.",goalCount:23},
  {id:"transport-logistics",label:"Transport & Logistics",color:T.violet,colorSoft:T.violetSoft,colorBorder:T.violetBorder,desc:"Fleet operations, delivery performance, route optimization, and shipment visibility.",goalCount:23},
];

const GOAL_CATEGORIES={
  manufacturing:["Production & Throughput","Quality & Compliance","Maintenance & Reliability","Supply Chain & Inventory","Workforce & Safety","Cost & Efficiency"],
  qsr:["Speed & Customer Experience","Food Quality & Safety","Labor & Workforce","Inventory & Waste","Revenue & Profitability","Multi-Unit & Franchise Ops","Drive-Thru & Digital"],
  "transport-logistics":["Delivery Performance","Fleet & Asset Mgmt","Warehouse & Distribution","Route Optimization","Safety & Compliance","Cost Management","Visibility & Tracking"],
};

const OPERATIONAL_GOALS=[
  {id:"mfg-oee",name:"Increase OEE",description:"Maximize productive capacity by improving availability, performance, and quality rates.",category:"Production & Throughput",industry:"manufacturing",metrics:["OEE %","Availability %","Performance %","Quality Rate %"],personas:["Plant Manager","VP of Operations"]},
  {id:"mfg-throughput",name:"Improve Production Throughput",description:"Increase units produced per unit of time without proportionally increasing resources.",category:"Production & Throughput",industry:"manufacturing",metrics:["Units/hr","Throughput rate","Takt time","Cycle time","Bottleneck util %"],personas:["Production Manager","Plant Manager"]},
  {id:"mfg-changeover",name:"Reduce Changeover Time",description:"Minimize time lost when switching production between products.",category:"Production & Throughput",industry:"manufacturing",metrics:["Changeover time (min)","SMED compliance %","Changeovers/shift"],personas:["Production Manager","Continuous Improvement Manager"]},
  {id:"mfg-scheduling",name:"Optimize Production Scheduling",description:"Improve adherence to plans and reduce schedule deviations.",category:"Production & Throughput",industry:"manufacturing",metrics:["Schedule adherence %","On-time completion","Plan variance"],personas:["Production Planner","Plant Manager"]},
  {id:"mfg-defects",name:"Reduce Defect Rate",description:"Lower the percentage of units that fail specifications at first pass.",category:"Quality & Compliance",industry:"manufacturing",metrics:["First Pass Yield %","DPMO","Scrap rate %","Rework rate %","COPQ"],personas:["Quality Director","Plant Manager"]},
  {id:"mfg-supplier-quality",name:"Improve Supplier Quality",description:"Ensure incoming materials meet specifications consistently.",category:"Quality & Compliance",industry:"manufacturing",metrics:["Supplier PPM","Incoming rejection %","SCARs issued"],personas:["Quality Director","Supply Chain Manager"]},
  {id:"mfg-regulatory",name:"Maintain Regulatory Compliance",description:"Meet all regulatory requirements (FDA, EPA, OSHA, ISO) and stay audit-ready.",category:"Quality & Compliance",industry:"manufacturing",metrics:["Audit findings","CAPA closure rate","Compliance score %"],personas:["Quality Director","Compliance Manager"]},
  {id:"mfg-customer-complaints",name:"Reduce Customer Complaints",description:"Decrease quality escapes that reach the customer.",category:"Quality & Compliance",industry:"manufacturing",metrics:["Complaints/million","Return rate %","Warranty cost","8D time"],personas:["Quality Director","VP of Operations"]},
  {id:"mfg-downtime",name:"Reduce Unplanned Downtime",description:"Minimize unexpected equipment failures that halt production.",category:"Maintenance & Reliability",industry:"manufacturing",metrics:["MTBF","Downtime hours","Downtime %","Breakdowns/month"],personas:["Plant Manager","Maintenance Manager"]},
  {id:"mfg-preventive-maintenance",name:"Shift to Preventive Maintenance",description:"Move from reactive break-fix toward scheduled and predictive maintenance.",category:"Maintenance & Reliability",industry:"manufacturing",metrics:["Planned Maintenance %","PM compliance %","Reactive ratio"],personas:["Maintenance Manager","Reliability Engineer"]},
  {id:"mfg-spare-parts",name:"Optimize Spare Parts & MRO",description:"Ensure critical parts available while avoiding excess inventory.",category:"Maintenance & Reliability",industry:"manufacturing",metrics:["Stockout rate","MRO carrying cost","MTTR","Parts avail %"],personas:["Maintenance Manager","Inventory Manager"]},
  {id:"mfg-raw-inventory",name:"Reduce Raw Material Inventory",description:"Minimize capital in raw material inventory while ensuring continuity.",category:"Supply Chain & Inventory",industry:"manufacturing",metrics:["Days on Hand","Turnover ratio","Carrying cost %","Stockouts"],personas:["Supply Chain Manager","VP of Operations"]},
  {id:"mfg-otif",name:"Improve On-Time Delivery",description:"Increase percentage of orders shipped complete and on time.",category:"Supply Chain & Inventory",industry:"manufacturing",metrics:["OTIF %","Fulfillment lead time","Backorder rate","Perfect order %"],personas:["VP of Operations","Supply Chain Manager"]},
  {id:"mfg-wip",name:"Reduce Work-In-Process",description:"Minimize partially completed inventory consuming space and lead time.",category:"Supply Chain & Inventory",industry:"manufacturing",metrics:["WIP value","WIP units","WIP days","Flow efficiency"],personas:["Production Manager","Plant Manager"]},
  {id:"mfg-supply-resilience",name:"Strengthen Supply Chain Resilience",description:"Reduce single-source dependency and build risk visibility.",category:"Supply Chain & Inventory",industry:"manufacturing",metrics:["Single-source %","Lead time variability","Safety stock days"],personas:["Supply Chain Manager","VP of Operations"]},
  {id:"mfg-injuries",name:"Reduce Workplace Injuries",description:"Lower frequency and severity of injuries through proactive safety.",category:"Workforce & Safety",industry:"manufacturing",metrics:["TRIR","LTIR","DART rate","Near-miss rate","OSHA recordables"],personas:["EHS Manager","Plant Manager"]},
  {id:"mfg-turnover",name:"Reduce Absenteeism & Turnover",description:"Address chronic absenteeism and high turnover impacting production.",category:"Workforce & Safety",industry:"manufacturing",metrics:["Absenteeism %","Turnover %","Time-to-fill","Overtime %"],personas:["HR Director","Plant Manager"]},
  {id:"mfg-training",name:"Improve Training & Certification",description:"Ensure all operators are trained and certified on processes.",category:"Workforce & Safety",industry:"manufacturing",metrics:["Completion %","Cert expiry alerts","Skills matrix coverage %"],personas:["HR Director","Training Manager"]},
  {id:"mfg-labor-utilization",name:"Optimize Labor Utilization",description:"Deploy right workers to right stations at right times.",category:"Workforce & Safety",industry:"manufacturing",metrics:["Labor efficiency %","Utilization rate","Overtime %","Output/hr"],personas:["Production Manager","Plant Manager"]},
  {id:"mfg-cost-per-unit",name:"Reduce Cost Per Unit",description:"Lower total cost per unit across labor, materials, energy, overhead.",category:"Cost & Efficiency",industry:"manufacturing",metrics:["Cost/unit","Mfg cost as % revenue","Variance to std cost"],personas:["VP of Operations","CFO"]},
  {id:"mfg-energy",name:"Reduce Energy Consumption",description:"Lower energy per unit for cost savings and sustainability.",category:"Cost & Efficiency",industry:"manufacturing",metrics:["kWh/unit","Energy intensity ratio","Carbon/unit"],personas:["Plant Manager","Sustainability Manager"]},

/* ═══ HELPERS ═══ */
const getGoalsByIndustry=(ind)=>OPERATIONAL_GOALS.filter(g=>g.industry===ind);

/* Only return personas that have PERSONA_DEFAULTS for this industry */
const getPersonasForIndustry=(industry)=>{
  return Object.keys(PERSONA_DEFAULTS).filter(pName=>{
    const ids=PERSONA_DEFAULTS[pName];
    return ids.some(id=>{const g=OPERATIONAL_GOALS.find(x=>x.id===id);return g&&g.industry===industry;});
  });
};

/* Derive focus description from persona's default goals */
const getPersonaFocus=(pName)=>{
  const ids=PERSONA_DEFAULTS[pName]||[];
  const cats=[...new Set(ids.map(id=>{const g=OPERATIONAL_GOALS.find(x=>x.id===id);return g?g.category:null;}).filter(Boolean))];
  return cats.slice(0,3).join(" · ")+(cats.length>3?` +${cats.length-3}`:"");
};

function GoalRow({goal,selected,recommended,onToggle,color,expanded,onExpand}){
  return<>
    <div className="goal-row" onClick={()=>onToggle(goal.id)}>
      <div className={`goal-cb${selected?" on":""}`} style={selected?{background:color}:{}}>
        {selected&&IC.check("#fff",11)}
      </div>
      <div className="goal-info">
        <div className="goal-name" style={{color:selected?"var(--text)":"var(--text-2)"}}>{goal.name}</div>
        <div className="goal-desc">{goal.description}</div>
      </div>
      <div className="goal-meta">
        {recommended&&<span className="rec-badge" style={{background:`${color}12`,color}}>{"\u2605"}</span>}
        <span className="goal-metrics-pill">{goal.metrics.length}</span>
        <div onClick={e=>{e.stopPropagation();onExpand(expanded?null:goal.id);}} style={{width:28,height:28,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",transition:"transform 0.2s",transform:expanded?"rotate(90deg)":"rotate(0)"}}>
          {IC.chevR("var(--text-3)",13)}

    </div>
    {expanded&&<div className="goal-expand">
      <div style={{fontSize:12.5,color:"var(--text-2)",lineHeight:1.6,marginBottom:10}}>{goal.description}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {goal.metrics.map((m,i)=><span key={i} className="pill" style={{background:selected?`${color}10`:"var(--surface-m)",color:selected?color:"var(--text-3)",fontSize:10}}>{m}</span>)}
      </div>
    </div>}
  </>;
}

function GoalsStep({industry,persona,selectedGoals,setSelectedGoals}){
  const ind=INDUSTRIES.find(i=>i.id===industry);
  const allGoals=getGoalsByIndustry(industry);
  const categories=GOAL_CATEGORIES[industry]||[];
  const recommendedIds=PERSONA_DEFAULTS[persona]||[];
  const[activeCat,setActiveCat]=useState("all");
  const[expandedGoal,setExpandedGoal]=useState(null);
  const tabsRef=useRef(null);

  const toggleGoal=(id)=>setSelectedGoals(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const selRecommended=()=>{setSelectedGoals(prev=>{const without=prev.filter(x=>!allGoals.map(g=>g.id).includes(x));return[...without,...recommendedIds];});};
  const selAll=()=>{const ids=allGoals.map(g=>g.id);setSelectedGoals(prev=>[...new Set([...prev,...ids])]);};
  const selNone=()=>{const ids=allGoals.map(g=>g.id);setSelectedGoals(prev=>prev.filter(x=>!ids.includes(x)));};

  const filteredCats=activeCat==="all"?categories:[activeCat];
  const selCount=allGoals.filter(g=>selectedGoals.includes(g.id)).length;

  return<div className="ob-content" style={{animation:"up 0.5s ease both",maxWidth:780,margin:"0 auto"}}>
    {/* Header */}
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        <span className="pill" style={{background:`${ind.color}12`,color:ind.color,border:`1px solid ${ind.color}25`,fontWeight:600,fontSize:11}}>{ind.label}</span>
        {persona&&<span className="pill" style={{background:"var(--surface-m)",color:"var(--text-2)",fontSize:11}}>{persona}</span>}
      </div>
      <h1 style={{fontFamily:"var(--serif)",fontSize:"clamp(22px,4.5vw,30px)",fontWeight:300,letterSpacing:"-0.04em",lineHeight:1.15,marginBottom:6}}>Select your operational goals</h1>
      <p style={{fontSize:13,color:"var(--text-3)",lineHeight:1.5}}>Pre-selected based on your role. Tap to select or deselect.</p>
    </div>

    {/* Category filter tabs */}
    <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
      <div className="cat-tabs" ref={tabsRef}>
        <div className={`cat-tab${activeCat==="all"?" active":""}`} onClick={()=>setActiveCat("all")} style={activeCat==="all"?{background:ind.color,borderColor:ind.color}:{}}>
          All <span style={{fontFamily:"var(--mono)",fontWeight:600,marginLeft:3}}>{selCount}/{allGoals.length}</span>
        </div>
        {categories.map(cat=>{
          const catGoals=allGoals.filter(g=>g.category===cat);
          const catSel=catGoals.filter(g=>selectedGoals.includes(g.id)).length;
          const isActive=activeCat===cat;
          return<div key={cat} className={`cat-tab${isActive?" active":""}`} onClick={()=>setActiveCat(cat)} style={isActive?{background:ind.color,borderColor:ind.color}:{}}>
            {cat} <span style={{fontFamily:"var(--mono)",fontWeight:600,marginLeft:3,opacity:0.7}}>{catSel}</span>
          </div>;
        })}
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:4,flexShrink:0}}>
        <div className="btn btn-ghost" style={{padding:"6px 10px",fontSize:11}} onClick={selRecommended}>Reset</div>
        <div className="btn btn-ghost" style={{padding:"6px 10px",fontSize:11}} onClick={selAll}>All</div>
        <div className="btn btn-ghost" style={{padding:"6px 10px",fontSize:11}} onClick={selNone}>None</div>
      </div>
    </div>

    {/* Goal rows grouped by category */}
    {filteredCats.map(cat=>{
      const catGoals=allGoals.filter(g=>g.category===cat);
      if(catGoals.length===0)return null;
      const catSel=catGoals.filter(g=>selectedGoals.includes(g.id)).length;
      return<div key={cat} style={{marginBottom:16}}>
        {(activeCat==="all")&&<div className="cat-hdr">
          <span style={{fontSize:12.5,fontWeight:600,letterSpacing:"-0.01em"}}>{cat}</span>
          <span style={{fontSize:11,fontFamily:"var(--mono)",color:catSel>0?ind.color:"var(--text-3)",fontWeight:600}}>{catSel}/{catGoals.length}</span>
        </div>}
        <div className="goal-list">
          {catGoals.map(g=><GoalRow key={g.id} goal={g} selected={selectedGoals.includes(g.id)} recommended={recommendedIds.includes(g.id)} onToggle={toggleGoal} color={ind.color} expanded={expandedGoal===g.id} onExpand={setExpandedGoal}/>)}
        </div>
      </div>;
    })}
  </div>;
}

/* ═══════════════════════════════════════════════
   STEP 4 — REVIEW
   ═══════════════════════════════════════════════ */
function ReviewStep({industry,persona,selectedGoals}){
  const ind=INDUSTRIES.find(i=>i.id===industry);
  const goals=OPERATIONAL_GOALS.filter(g=>selectedGoals.includes(g.id));
  const categories=[...new Set(goals.map(g=>g.category))];

  return<div className="ob-content" style={{animation:"up 0.5s ease both",maxWidth:700,margin:"0 auto",textAlign:"center"}}>
    <div style={{marginBottom:32}}>
      <div style={{width:64,height:64,borderRadius:18,background:`${ind.color}12`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",border:`2px solid ${ind.color}22`}}>
        {IC.check(ind.color,28)}
      </div>
      <h1 style={{fontFamily:"var(--serif)",fontSize:"clamp(24px,5vw,32px)",fontWeight:300,letterSpacing:"-0.04em",lineHeight:1.15,marginBottom:8}}>You're all set</h1>
      <p style={{fontSize:14,color:"var(--text-2)",lineHeight:1.6,maxWidth:400,margin:"0 auto"}}>
        Configured for <strong style={{color:"var(--text)"}}>{ind.label}</strong> as <strong style={{color:"var(--text)"}}>{persona}</strong> with {selectedGoals.length} goals.
      </p>
    </div>

    <div className="rev-cards" style={{marginBottom:24,textAlign:"left"}}>
      <div className="rev-card">
        <div className="rev-label">Industry</div>
        <div style={{fontSize:15,fontWeight:500,marginBottom:6}}>{ind.label}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {(GOAL_CATEGORIES[industry]||[]).slice(0,3).map(c=><span key={c} className="pill" style={{background:`${ind.color}10`,color:ind.color,fontSize:10}}>{c}</span>)}
          {(GOAL_CATEGORIES[industry]||[]).length>3&&<span className="pill" style={{background:"var(--surface-m)",color:"var(--text-3)",fontSize:10}}>+{(GOAL_CATEGORIES[industry]||[]).length-3}</span>}
        </div>
      </div>
      <div className="rev-card">
        <div className="rev-label">Role</div>
        <div style={{fontSize:15,fontWeight:500,marginBottom:6}}>{persona}</div>
        <div style={{fontSize:12,color:"var(--text-3)",lineHeight:1.5}}>Dashboards and alerts tailored to this role.</div>
      </div>
      <div className="rev-card">
        <div className="rev-label">Goals</div>
        <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:6}}>
          <span style={{fontSize:26,fontWeight:300,fontFamily:"var(--serif)",color:ind.color}}>{selectedGoals.length}</span>
          <span style={{fontSize:12,color:"var(--text-3)"}}>across {categories.length} categories</span>
        </div>
      </div>
    </div>

    <div className="rev-goallist" style={{textAlign:"left",marginBottom:10}}>
      {categories.map(cat=>{
        const catGoals=goals.filter(g=>g.category===cat);
        return<div key={cat}>
          <div className="rev-cathdr">
            <span style={{fontSize:11.5,fontWeight:600,letterSpacing:"-0.01em"}}>{cat}</span>
            <span style={{fontSize:10,fontFamily:"var(--mono)",color:ind.color,fontWeight:600}}>{catGoals.length}</span>
          </div>
          {catGoals.map((g,i)=><div key={g.id} className="rev-goalrow">
            <div style={{width:7,height:7,borderRadius:"50%",background:ind.color,opacity:0.5,flexShrink:0}}/>
            <span style={{flex:1}}>{g.name}</span>
            <span style={{fontSize:10,fontFamily:"var(--mono)",color:"var(--text-3)"}}>{g.metrics.length}</span>
          </div>)}
        </div>;
      })}
    </div>
  </div>;
}

/* ═══════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════ */
function OnboardingApp(){
  const[step,setStep]=useState(0);
  const[industry,setIndustry]=useState("");
  const[persona,setPersona]=useState("");
  const[selectedGoals,setSelectedGoals]=useState([]);
  const bodyRef=useRef(null);

  const stepLabels=["Industry","Role","Goals","Review"];

  /* Scroll to top on step change */
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=0;},[step]);

  /* Auto-set goals when persona changes */
  const prevPersona=useRef(persona);
  useEffect(()=>{
    if(persona&&persona!==prevPersona.current){
      setSelectedGoals(PERSONA_DEFAULTS[persona]||[]);
      prevPersona.current=persona;
    }
  },[persona]);

  const canNext=()=>{
    if(step===0)return!!industry;
    if(step===1)return!!persona;
    if(step===2)return selectedGoals.length>0;
    return true;
  };

  const ind=INDUSTRIES.find(i=>i.id===industry);

  return<div className="ob-shell">
    {/* ── HEADER ── */}
    <div className="ob-header">
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="20" fill="#001F5B"/><path d="M50 15 L30 40 L35 40 L35 55 L25 55 L25 75 L40 75 L40 60 L45 60 L45 75 L55 75 L55 60 L60 60 L60 75 L75 75 L75 55 L65 55 L65 40 L70 40 Z" fill="#fff"/><circle cx="50" cy="32" r="5" fill="#C4A84E"/></svg>
        <span style={{fontFamily:"var(--serif)",fontSize:15,fontWeight:500,letterSpacing:"-0.02em"}}>RC Marine Ops</span>
      </div>

      {/* Mobile: dots */}
      <div className="step-dots">
        {stepLabels.map((_,i)=><div key={i} className={`step-dot${i<step?" done":""}${i===step?" active":""}`}/>)}
      </div>

      {/* Desktop: labeled steps */}
      <div className="step-labels">
        {stepLabels.map((label,i)=>{
          const done=i<step;const active=i===step;
          return<React.Fragment key={i}>
            {i>0&&<div className={`step-line${done?" done":""}`}/>}
            <div className="step-label" style={active?{background:"rgba(26,26,30,0.04)"}:{}}>
              <div className={`step-num${done?" done":""}${active?" active":""}`}>{done?IC.check("#fff",9):i+1}</div>
              <span className={`step-text${active?" active":""}${done?" done":""}`}>{label}</span>
            </div>
          </React.Fragment>;
        })}
      </div>

      <div className="btn btn-ghost" style={{fontSize:12,padding:"8px 12px",color:"var(--text-3)"}}>Skip</div>
    </div>

    {/* ── PROGRESS BAR ── */}
    <div style={{height:2,background:"var(--border-s)"}}>
      <div style={{height:"100%",width:`${(step/3)*100}%`,background:"var(--accent)",transition:"width 0.5s cubic-bezier(0.4,0,0.2,1)"}}/>
    </div>

    {/* ── BODY ── */}
    <div className="ob-body" ref={bodyRef}>
      {step===0&&<IndustryStep industry={industry} setIndustry={setIndustry}/>}
      {step===1&&<PersonaStep industry={industry} persona={persona} setPersona={setPersona}/>}
      {step===2&&<GoalsStep industry={industry} persona={persona} selectedGoals={selectedGoals} setSelectedGoals={setSelectedGoals}/>}
      {step===3&&<ReviewStep industry={industry} persona={persona} selectedGoals={selectedGoals}/>}
    </div>

    {/* ── FOOTER ── */}
    <div className="ob-footer">
      <div>
        {step>0&&<button className="btn btn-secondary" onClick={()=>setStep(step-1)}>
          {IC.chevL("var(--text-2)",14)}<span>Back</span>
        </button>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        {step===2&&<span style={{fontSize:12,fontFamily:"var(--mono)",color:selectedGoals.length>0?(ind?ind.color:"var(--accent)"):"var(--text-3)",fontWeight:600}}>
          {selectedGoals.length} selected
        </span>}
        {step<3?(
          <button className="btn btn-primary" disabled={!canNext()} onClick={()=>{if(canNext())setStep(step+1);}}>
            <span>Continue</span>{IC.chevR(canNext()?"#fff":"var(--text-3)",14)}
          </button>
        ):(
          <button className="btn btn-launch" style={{background:ind?ind.color:"var(--accent)"}} onClick={()=>alert("Onboarding complete! This would transition to your workspace.")}>
            {IC.sparkle("#fff",14)}<span>Launch workspace</span>
          </button>
        )}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<OnboardingApp />);
  </script>
</body>
</html>
